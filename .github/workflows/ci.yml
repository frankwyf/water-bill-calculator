name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────
  # Linux — gcc and clang
  # ──────────────────────────────────────────────────────────
  linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v7

      - name: Install compilers
        run: sudo apt-get update && sudo apt-get install -y gcc clang

      - name: Build
        run: make CC=${{ matrix.compiler }}

      - name: Test
        run: make test CC=${{ matrix.compiler }}

  # ──────────────────────────────────────────────────────────
  # macOS — clang (Xcode)
  # ──────────────────────────────────────────────────────────
  macos:
    name: macOS (clang)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: make

      - name: Test
        run: make test

  # ──────────────────────────────────────────────────────────
  # Windows — MinGW-w64 via MSYS2
  # ──────────────────────────────────────────────────────────
  windows:
    name: Windows (MinGW-w64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v7

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Build
        run: make

      - name: Test
        run: make test
